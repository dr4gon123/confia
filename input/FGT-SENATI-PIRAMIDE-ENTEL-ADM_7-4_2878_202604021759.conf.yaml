dlp_filepattern:
    - 1:
        name: "builtin-patterns"
        entries:
            - *.bat:

            - *.com:

            - *.dll:

            - *.doc:

            - *.exe:

            - *.gz:

            - *.hta:

            - *.ppt:

            - *.rar:

            - *.scr:

            - *.tar:

            - *.tgz:

            - *.vb?:

            - *.wps:

            - *.xl?:

            - *.zip:

            - *.pif:

            - *.cpl:



    - 2:
        name: "all_executables"
        entries:
            - bat:
                filter-type: type
                file-type: bat

            - exe:
                filter-type: type
                file-type: exe

            - elf:
                filter-type: type
                file-type: elf

            - hta:
                filter-type: type
                file-type: hta




dlp_sensitivity:
    - Private:

    - Critical:

    - Warning:


dlp_profile:
    - Content_Summary:
        feature-set: proxy
        summary-proto: [smtp, pop3, imap, http-get, http-post, ftp, nntp, mapi]

    - Content_Archive:
        feature-set: proxy
        full-archive-proto: [smtp, pop3, imap, http-get, http-post, ftp, nntp, mapi]
        summary-proto: [smtp, pop3, imap, http-get, http-post, ftp, nntp, mapi]

    - Large-File:
        feature-set: proxy
        rule:
            - 1:
                name: "Large-File-Filter"
                proto: [smtp, pop3, imap, http-get, http-post, mapi]
                file-size: 5120
                action: log-only



    - Credit-Card:
        feature-set: proxy
        rule:
            - 1:
                name: "Credit-Card-Filter"
                severity: high
                proto: [smtp, pop3, imap, http-get, http-post, mapi]
                filter-by: sensor
                sensor: "def-cc-sensor"
                action: log-only

            - 2:
                name: "Credit-Card-Filter"
                severity: high
                type: message
                proto: [smtp, pop3, imap, http-post, mapi]
                filter-by: sensor
                sensor: "def-cc-sensor"
                action: log-only



    - SSN-Sensor:
        comment: "Match SSN numbers but NOT WebEx invite emails."
        feature-set: proxy
        rule:
            - 1:
                name: "SSN-Sensor-Filter"
                severity: high
                type: message
                proto: [smtp, pop3, imap, mapi]
                filter-by: sensor
                sensor: "SSN-Sensor-r1s"

            - 2:
                name: "SSN-Sensor-Filter"
                severity: high
                type: message
                proto: [smtp, pop3, imap, mapi]
                filter-by: sensor
                sensor: "def-ssn-sensor"
                action: log-only

            - 3:
                name: "SSN-Sensor-Filter"
                severity: high
                proto: [smtp, pop3, imap, http-get, http-post, ftp, mapi]
                filter-by: sensor
                sensor: "def-ssn-sensor"
                action: log-only



    - sniffer-profile:
        comment: "Log a summary of email and web traffic."
        summary-proto: [smtp, pop3, imap, http-get, http-post]

    - default:
        comment: "Default profile."


