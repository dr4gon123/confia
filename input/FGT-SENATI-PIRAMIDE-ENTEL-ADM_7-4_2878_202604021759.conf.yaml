firewall_internet-service-definition:

wanopt_content-delivery-network-rule:
    - vcache://:
        comment: "Static entries are not allowed to change except disable."
        response-expires: enable
        text-response-vcache: disable
        rules:
            - rule1:
                match-entries:
                    - 1:
                        pattern: "/*.m3u8"


                content-id:
                    target: hls-manifest


            - rule2:
                match-entries:
                    - 1:
                        pattern: "/*.mpd"


                content-id:
                    target: dash-manifest


            - rule3:
                match-entries:
                    - 1:
                        pattern: "/*.ts"


                content-id:
                    target: hls-fragment


            - rule4:
                match-entries:
                    - 1:
                        pattern: "/*.*"


                content-id:
                    target: dash-fragment




    - vcache://youtube/:
        comment: "Static entries are not allowed to change except disable."
        host-domain-name-suffix: "youtube.com"
        category: youtube
        text-response-vcache: disable
        rules:
            - rule1:
                match-entries:
                    - 1:
                        pattern: "/videoplayback"


                content-id:
                    target: youtube-id
                    start-str: "v="
                    start-skip: 2
                    end-str: "&"


            - rule2:
                match-entries:
                    - 1:
                        pattern: "/videoplayback"


                content-id:
                    target: youtube-id
                    start-str: "v="
                    start-skip: 2


            - rule3:
                match-mode: any
                match-entries:
                    - 1:
                        pattern: "/stream_204"

                    - 2:
                        pattern: "/ptracking"

                    - 3:
                        pattern: "/get_video_info"


                content-id:
                    target: youtube-map




