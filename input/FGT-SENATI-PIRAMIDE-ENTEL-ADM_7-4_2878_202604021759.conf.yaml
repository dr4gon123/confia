system_automation-trigger:
    - Compromised Host:
        description: "An incident of compromise has been detected on a host endpoint."

    - Any Security Rating Notification:
        description: "A security rating summary report has been generated."
        event-type: security-rating-summary
        report-type: any

    - AV & IPS DB update:
        description: "The antivirus and IPS database has been updated."
        event-type: virus-ips-db-updated

    - Configuration Change:
        description: "An administrator\'s session that changed a FortiGate\'s configuration has ended."
        event-type: config-change

    - Conserve Mode:
        description: "A FortiGate has entered conserve mode due to low memory."
        event-type: low-memory

    - HA Failover:
        description: "A HA failover has occurred."
        event-type: ha-failover

    - High CPU:
        description: "A FortiGate has high CPU usage."
        event-type: high-cpu

    - License Expiry:
        description: "A FortiGate license is near expiration."
        event-type: license-near-expiry
        license-type: any

    - Reboot:
        description: "A FortiGate is rebooted."
        event-type: reboot

    - Anomaly Logs:
        description: "An anomalous event has occurred."
        event-type: anomaly-logs

    - IPS Logs:
        description: "An IPS event has occurred."
        event-type: ips-logs

    - SSH Logs:
        description: "An SSH event has occurred."
        event-type: ssh-logs

    - Traffic Violation:
        description: "A traffic policy has been violated."
        event-type: traffic-violation

    - Virus Logs:
        description: "A virus event has occurred."
        event-type: virus-logs

    - Webfilter Violation:
        description: "A webfilter policy has been violated."
        event-type: webfilter-violation

    - Admin Login:
        description: "A FortiOS event with specified log ID has occurred."
        event-type: event-log
        logid: 32001

    - Incoming Webhook Call:
        description: "An incoming webhook call is received"
        event-type: incoming-webhook

    - Weekly Trigger:
        trigger-type: scheduled
        trigger-frequency: weekly
        trigger-weekday: tuesday
        trigger-hour: 10

    - FortiAnalyzer Connection Down:
        description: "A FortiAnalyzer connection is down."
        event-type: event-log
        logid: 22902

    - Network Down:
        description: "A network connection is down."
        event-type: event-log
        logid: 20099
        fields:
            - 1:
                name: "status"
                value: "DOWN"



    - Local Certificate Expiry:
        description: "A local certificate is near expiration."
        event-type: local-cert-near-expiry

    - License Expired Notification:
        event-type: license-near-expiry
        license-type: any

    - Compromised Host Quarantine:

    - Security Rating Notification:
        event-type: security-rating-summary

    - Local Cert Expired Notification:
        description: "Default automation trigger configuration for when a local certificate is near expiration."
        event-type: local-cert-near-expiry

    - vpn-fail-5-in-1h:
        description: "Usuario VPN SSL 5 Intentos Fallidos durante 1 Hora"
        event-type: event-log
        logid: 39426

    - Auto Firmware upgrade:
        description: "Automatic firmware upgrade."
        event-type: event-log
        logid: [22094, 22095, 32263]


system_automation-action:
    - Access Layer Quarantine:
        description: "Quarantine the MAC address on access layer devices (FortiSwitch and FortiAP)."
        action-type: quarantine

    - FortiClient Quarantine:
        description: "Use FortiClient EMS to quarantine the endpoint device."
        action-type: quarantine-forticlient

    - FortiNAC Quarantine:
        description: "Use FortiNAC to quarantine the endpoint device."
        action-type: quarantine-fortinac

    - IP Ban:
        description: "Ban the IP address specified in the automation trigger event."
        action-type: ban-ip

    - FortiExplorer Notification:
        description: "Automation action configuration for sending a notification to any FortiExplorer mobile application."
        action-type: fortiexplorer-notification

    - Email Notification:
        description: "Send a custom email to the specified recipient(s)."
        action-type: email
        email-subject: "%%log.logdesc%%"

    - CLI Script - System Status:
        description: "Execute a CLI script to return the system status."
        action-type: cli-script
        script: "get system status"
        accprofile: "super_admin_readonly"

    - Reboot FortiGate:
        description: "Default automation action configuration for rebooting this FortiGate unit."
        action-type: system-actions
        system-action: reboot
        minimum-interval: 300

    - Shutdown FortiGate:
        description: "Default automation action configuration for shuting down this FortiGate unit."
        action-type: system-actions
        system-action: shutdown

    - Backup Config Disk:
        description: "Default automation action configuration for backing up the configuration on disk."
        action-type: system-actions
        system-action: backup-config

    - Network Down_email:
        action-type: email
        email-subject: "Network Down"

    - HA Failover_email:
        action-type: email
        email-subject: "HA Failover"

    - Reboot_email:
        action-type: email
        email-subject: "Reboot"

    - FortiAnalyzer Connection Down_ios-notification:
        action-type: fortiexplorer-notification

    - License Expired Notification_ios-notification:
        action-type: fortiexplorer-notification

    - Security Rating Notification_ios-notification:
        action-type: fortiexplorer-notification

    - Compromised Host Quarantine_quarantine:
        action-type: quarantine

    - Compromised Host Quarantine_quarantine-forticlient:
        action-type: quarantine-forticlient


system_automation-stitch:
    - Network Down:
        description: "Send an email when a network goes down."
        status: disable
        trigger: "Network Down"
        actions:
            - 1:
                action: "Network Down_email"



    - HA Failover:
        description: "Send an email when a HA failover is detected."
        status: disable
        trigger: "HA Failover"
        actions:
            - 1:
                action: "HA Failover_email"



    - Reboot:
        description: "Send an email when a FortiGate is rebooted."
        status: disable
        trigger: "Reboot"
        actions:
            - 1:
                action: "Reboot_email"



    - FortiAnalyzer Connection Down:
        description: "Send a email notification when the connection to FortiAnalyzer is lost."
        status: disable
        trigger: "FortiAnalyzer Connection Down"
        actions:
            - 1:
                action: "FortiAnalyzer Connection Down_ios-notification"



    - License Expired Notification:
        description: "Send a email notification when a license is near expiration."
        status: disable
        trigger: "License Expired Notification"
        actions:
            - 1:
                action: "License Expired Notification_ios-notification"



    - Compromised Host Quarantine:
        description: "Quarantine a compromised host on FortiAPs, FortiSwitches, and FortiClient EMS."
        status: disable
        trigger: "Compromised Host Quarantine"
        actions:
            - 1:
                action: "Compromised Host Quarantine_quarantine"

            - 2:
                action: "Compromised Host Quarantine_quarantine-forticlient"



    - Incoming Webhook Quarantine:
        description: "Quarantine a provided MAC address on FortiAPs, FortiSwitches, and FortiClient EMS using an Incoming Webhook."
        status: disable
        trigger: "Incoming Webhook Call"
        actions:
            - 1:
                action: "Compromised Host Quarantine_quarantine"

            - 2:
                action: "Compromised Host Quarantine_quarantine-forticlient"



    - Security Rating Notification:
        description: "Send a email notification when a new Security Rating report is available."
        status: disable
        trigger: "Security Rating Notification"
        actions:
            - 1:
                action: "Security Rating Notification_ios-notification"



    - Firmware upgrade notification:
        description: "Automatic firmware upgrade notification."
        trigger: "Auto Firmware upgrade"
        condition-logic: or
        actions:
            - 1:
                action: "Email Notification"




system_federated-upgrade:
    status: disabled

system_ike:
    dh-multiprocess: disable

system_ipam:
    pools:
        - default-pool:
            subnet: [172.31.0.0, 255.255.0.0]

        - lan-pool:
            subnet: [192.168.0.0, 255.255.0.0]


    rules:
        - role-lan:
            device: "*"
            interface: "*"
            role: lan
            pool: "lan-pool"
            dhcp: enable



system_object-tagging:
    - default:


switch-controller_traffic-policy:
    - quarantine:
        description: "Rate control for quarantined traffic"
        guaranteed-bandwidth: 163840
        guaranteed-burst: 8192
        maximum-burst: 163840
        cos-queue: 0
        id: 1

    - sniffer:
        description: "Rate control for sniffer mirrored traffic"
        guaranteed-bandwidth: 50000
        guaranteed-burst: 8192
        maximum-burst: 163840
        cos-queue: 0
        id: 2


system_settings:
    sip-nat-trace: disable
    h323-direct-model: enable
    default-voip-alg-mode: kernel-helper-based
    gui-dns-database: enable
    gui-load-balance: enable
    gui-multicast-policy: enable
    gui-voip-profile: enable
    gui-local-in-policy: enable
    gui-explicit-proxy: enable
    gui-policy-based-ipsec: enable
    gui-spamfilter: enable
    gui-sslvpn: enable
    gui-waf-profile: enable
    gui-virtual-patch-profile: enable
    gui-fortiextender-controller: disable
    gui-advanced-policy: enable
    gui-allow-unnamed-policy: enable
    gui-multiple-interface-policy: enable
    gui-policy-disclaimer: enable
    gui-dynamic-device-os-id: enable
    ike-tcp-port: 10443

