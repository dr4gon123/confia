ips_sensor:
    - IPS_SRV_EMAIL:
        comment: "Protect against email server-side vulnerabilities."
        block-malicious-url: enable
        scan-botnet-connections: block
        entries:
            - 2:
                location: server
                severity: [info, low]
                protocol: [SMTP, POP3, IMAP, SMTPS, POP3S, IMAPS]

            - 1:
                location: server
                severity: [medium, high, critical]
                protocol: [SMTP, POP3, IMAP, HTTPS, SMTPS, POP3S, IMAPS]
                action: block



    - IPS_FROM_LAN:
        comment: "Protect against client-side vulnerabilities."
        block-malicious-url: enable
        scan-botnet-connections: block
        entries:
            - 2:
                location: client
                severity: [info, low]

            - 1:
                location: client
                severity: [medium, high, critical]
                action: block



    - IPS_FROM_DC:
        comment: "Blocks all Critical/High/Medium and some Low severity vulnerabilities"
        block-malicious-url: enable
        scan-botnet-connections: block
        entries:
            - 2:
                severity: [info, low]

            - 1:
                severity: [medium, high, critical]
                status: enable
                action: block



    - default:
        comment: "Prevent critical attacks."
        block-malicious-url: enable
        scan-botnet-connections: block
        entries:
            - 1:
                severity: [medium, high, critical]
                action: block



    - IPS_SRV_HTTP-HTTPS:
        comment: "Protect against HTTP server-side vulnerabilities."
        block-malicious-url: enable
        scan-botnet-connections: block
        entries:
            - 1:
                location: server
                severity: [medium, high, critical]
                protocol: [HTTP, HTTPS]
                action: block

            - 2:
                location: server
                severity: [info, low]
                protocol: [HTTP, HTTPS]



    - IPS_SRV_WINDOWS-LINUX:
        scan-botnet-connections: block
        entries:
            - 2:
                severity: [info, low]

            - 1:
                location: server
                severity: [medium, high, critical]
                os: [Windows, Linux]
                action: block



    - wifi-default:
        comment: "Default configuration for offloading WiFi traffic."
        entries:
            - 1:
                severity: [medium, high, critical]



    - sniffer-profile:
        comment: "Monitor IPS attacks."
        entries:
            - 1:
                severity: [medium, high, critical]



    - IPS_DNS:
        entries:
            - 1:
                protocol: DNS




