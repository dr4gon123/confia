# Scraper default settings.
# Override any of these with CLI flags (flags take priority).

# Rescape files even if they already exist
force: false

# Max retry attempts per page
retries: 3

# Seconds between requests (throttle)
delay: 1.5

# Page navigation timeout (milliseconds)
timeout: 30000

# Playwright wait strategy: domcontentloaded, load, networkidle
wait_until: domcontentloaded

# Minimum file size (bytes) to consider a file "already scraped"
min_size: 200

# Output subdirectory under REPO_ROOT
output_dir: config

# User-Agent header
user_agent: "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

# Launch browser with visible window (debugging)
headed: false

# Suppress progress output (only errors)
quiet: false
